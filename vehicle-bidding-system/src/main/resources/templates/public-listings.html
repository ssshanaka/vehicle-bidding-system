<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Browse Listings - Vehicle Bidding System</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container mt-5">
      <h1 class="mb-4">Vehicle Listings</h1>
      <form class="row g-2 mb-3" method="get">
        <div class="col-auto">
          <input
            class="form-control"
            name="search"
            th:value="${search}"
            placeholder="Search make or model"
          />
        </div>
        <div class="col-auto">
          <button class="btn btn-primary">Search</button>
        </div>
      </form>
      <div class="row" th:if="${listings}">
        <div class="col-md-4 mb-3" th:each="l : ${listings}">
          <div class="card h-100">
            <div class="card-body">
              <h5 class="card-title" th:text="${l.make + ' ' + l.model}"></h5>
              <p class="card-text">
                Year: <span th:text="${l.year}"></span> • Mileage:
                <span th:text="${l.mileage}"></span>
              </p>
              <a
                th:href="@{'/listings/' + ${l.listingId}}"
                class="btn btn-outline-primary"
                >View</a
              >
            </div>
          </div>
        </div>
      </div>
      <div th:if="${listings.isEmpty()}">No listings found.</div>
    </div>
  </body>
</html>
