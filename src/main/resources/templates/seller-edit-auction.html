<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Auction - Vehicle Bidding System</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link th:href="@{/css/styles.css}" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body>
    <div class="container mt-5">
      <h1 class="mb-4">Edit Auction</h1>

      <form
        th:action="@{/seller/auctions/edit/{id}(id=${auction.auctionId})}"
        th:object="${auction}"
        method="post"
        class="needs-validation"
        novalidate
      >
        <div class="mb-3">
          <label for="listingId" class="form-label">Your Vehicle Listing</label>
          <select
            id="listingId"
            th:field="*{listing.listingId}"
            class="form-select"
            required
            disabled
          >
            <option
              th:value="${auction.listing.listingId}"
              th:text="${auction.listing.make + ' ' + auction.listing.model}"
              selected
            ></option>
          </select>
        </div>

        <div class="mb-3">
          <label for="startTime" class="form-label"
            >Proposed Start Time (Mandatory)</label
          >
          <input
            type="datetime-local"
            id="startTime"
            th:field="*{startTime}"
            class="form-control"
            required
          />
          <div class="invalid-feedback">
            Start time is required and must be in the future.
          </div>
        </div>
