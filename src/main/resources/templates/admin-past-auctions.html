<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Past Auctions - Admin Panel</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="/css/custom.css" rel="stylesheet" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="/">
          <i class="fas fa-car"></i> Vehicle Bidding System
        </a>
        <div class="navbar-nav ms-auto">
          <a class="nav-link" href="/admin/dashboard">Dashboard</a>
          <a class="nav-link" href="/admin/listings">Listings</a>
          <a class="nav-link" href="/logout">Logout</a>
        </div>
      </div>
    </nav>

    <div class="container mt-4">
      <div class="row">
        <div class="col-12">
          <h1 class="mb-4"><i class="fas fa-history"></i> Past Auctions</h1>
        </div>
      </div>

      <div class="row">
        <div class="col-12">
          <div class="card">
            <div class="card-body">
              <div class="table-responsive">
                <table class="table table-striped">
                  <thead>
                    <tr>
                      <th>Auction ID</th>
                      <th>Vehicle</th>
                      <th>Year</th>
                      <th>Seller</th>
                      <th>Winner</th>
                      <th>Start Time</th>
                      <th>End Time</th>
                      <th>Highest Bid</th>
                      <th>Actions</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr th:each="auction : ${auctions.content}">
                      <td th:text="${auction.auctionId}">1</td>
                      <td
                        th:text="${auction.listing.make + ' ' + auction.listing.model}"
                      >
                        Toyota Camry
                      </td>
                      <td th:text="${auction.listing.year}">2020</td>
                      <td th:text="${auction.listing.seller.username}">
                        seller1
                      </td>
                      <td
                        th:text="${auction.winner != null ? auction.winner.username : 'No winner'}"
                      >
                        buyer1
                      </td>
                      <td
                        th:text="${#temporals.format(auction.startTime, 'yyyy-MM-dd HH:mm')}"
                      >
                        2024-01-15 10:00
                      </td>
                      <td
                        th:text="${#temporals.format(auction.endTime, 'yyyy-MM-dd HH:mm')}"
                      >
                        2024-01-15 14:30
                      </td>
                      <td
                        th:text="${auction.highestBid != null ? '$' + #numbers.formatDecimal(auction.highestBid, 1, 2) : 'No bids'}"
                      >
                        $15,000
                      </td>
                      <td>
                        <button
                          class="btn btn-sm btn-info"
                          th:onclick="'viewAuctionDetails(' + ${auction.auctionId} + ')'"
                        >
                          <i class="fas fa-eye"></i> View Details
                        </button>
                      </td>
                    </tr>
                    <tr th:if="${auctions.content.isEmpty()}">
                      <td colspan="9" class="text-center text-muted">
                        No past auctions
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>

              <!-- Pagination -->
              <nav th:if="${auctions.totalPages > 1}">
                <ul class="pagination justify-content-center">
                  <li
                    class="page-item"
                    th:classappend="${currentPage == 0} ? 'disabled'"
                  >
                    <a
                      class="page-link"
                      th:href="@{/admin/auctions/past(page=${currentPage - 1})}"
                      >Previous</a
                    >
                  </li>
                  <li
                    class="page-item"
                    th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                    th:classappend="${i == currentPage} ? 'active'"
                  >
                    <a
                      class="page-link"
                      th:href="@{/admin/auctions/past(page=${i})}"
                      th:text="${i + 1}"
                      >1</a
                    >
                  </li>
                  <li
                    class="page-item"
                    th:classappend="${currentPage == totalPages - 1} ? 'disabled'"
                  >
                    <a
                      class="page-link"
                      th:href="@{/admin/auctions/past(page=${currentPage + 1})}"
                      >Next</a
                    >
                  </li>
                </ul>
              </nav>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      function viewAuctionDetails(auctionId) {
        window.open(`/auctions/details/${auctionId}`, "_blank");
      }
    </script>
  </body>
</html>
