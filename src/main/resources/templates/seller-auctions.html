<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Auctions - Vehicle Bidding System</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link th:href="@{/css/styles.css}" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- WebSocket Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

    <!-- Auction Timer -->
    <script th:src="@{/js/auction-timer.js}"></script>
  </head>
  <body>
    <div class="container mt-5">
      <h1 class="mb-4">My Auctions</h1>

      <a th:href="@{/seller/auctions/create}" class="btn btn-success mb-3"
        >Create New Auction</a
      >

      <div class="table-responsive">
        <table class="table table-striped table-hover">
          <thead class="table-dark">
            <tr>
              <th>ID</th>
              <th>Vehicle</th>
              <th>Current Bid</th>
              <th>Status</th>
              <th>Countdown</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="auction : ${sellerAuctions}">
              <td th:text="${auction.auctionId}"></td>
              <td
                th:text="${auction.listing.make + ' ' + auction.listing.model}"
              ></td>
              <td th:text="${auction.highestBid}"></td>
              <td th:text="${auction.status}"></td>
              <td>
                <span
                  th:id="${'countdown-' + auction.auctionId}"
                  th:attr="data-end-time=${auction.currentEndTime}"
                ></span>
              </td>
              <td>
                <a
                  th:href="@{/auctions/details/{id}(id=${auction.auctionId})}"
                  class="btn btn-sm btn-info"
                  >View Details</a
                >
                <!-- Edit only if Pending -->
                <a
                  th:href="@{/seller/auctions/edit/{id}(id=${auction.auctionId})}"
                  class="btn btn-sm btn-warning"
                  th:if="${auction.status.name() == 'PENDING'}"
                  >Edit</a
                >
              </td>
            </tr>
            <tr th:if="${sellerAuctions.empty}">
              <td colspan="6" class="text-center">No auctions created yet.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </body>
</html>
