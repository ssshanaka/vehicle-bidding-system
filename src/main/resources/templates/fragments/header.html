<!-- Header Fragment -->
<div th:fragment="header" id="main-header">
  <!-- Header CSS -->
  <link th:href="@{/css/header.css}" rel="stylesheet" />

  <!-- Navigation Bar -->
  <nav
    class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top shadow"
    id="header-navbar"
  >
    <div class="container">
      <!-- Brand Logo -->
      <a class="navbar-brand d-flex align-items-center" href="/">
        <i class="bi bi-car-front me-2" style="font-size: 1.5rem"></i>
        <span class="fw-bold">Lanka Auto Traders</span>
      </a>

      <!-- Mobile Toggle Button -->
      <button
        class="navbar-toggler border-0"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarNav"
        aria-controls="navbarNav"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Navigation Menu -->
      <div class="collapse navbar-collapse" id="navbarNav">
        <!-- Left Side Navigation -->
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link" href="/">
              <i class="bi bi-house me-1"></i>Home
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/auctions">
              <i class="bi bi-grid-3x3-gap me-1"></i>Browse Auctions
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/help">
              <i class="bi bi-question-circle me-1"></i>Help Center
            </a>
          </li>
          <li class="nav-item" th:if="${user != null or currentUser != null}">
            <a class="nav-link" href="/seller/listings/create">
              <i class="bi bi-plus-circle me-1"></i>Sell Vehicle
            </a>
          </li>
          <li
            class="nav-item"
            th:if="${(user != null and user.role.name() == 'ADMIN_OFFICER') or (currentUser != null and currentUser.role.name() == 'ADMIN_OFFICER')}"
          >
            <a class="nav-link" href="/admin/dashboard">
              <i class="bi bi-shield-check me-1"></i>Admin Panel
            </a>
          </li>
        </ul>

        <!-- Right Side Navigation -->
        <ul class="navbar-nav">
          <!-- Unauthenticated Users -->
          <div
            th:unless="${user != null or currentUser != null}"
            class="d-flex align-items-center"
          >
            <li class="nav-item me-2">
              <a class="nav-link" href="/login">
                <i class="bi bi-box-arrow-in-right me-1"></i>Login
              </a>
            </li>
            <li class="nav-item">
              <a class="btn btn-outline-light btn-sm" href="/register">
                <i class="bi bi-person-plus me-1"></i>Register
              </a>
            </li>
          </div>
