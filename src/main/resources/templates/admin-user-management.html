<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Management - Admin Panel</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="/css/custom.css" rel="stylesheet" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="/">
          <i class="fas fa-car"></i> Vehicle Bidding System
        </a>
        <div class="navbar-nav ms-auto">
          <a class="nav-link" href="/admin/dashboard">Dashboard</a>
          <a class="nav-link" href="/logout">Logout</a>
        </div>
      </div>
    </nav>

    <div class="container mt-4">
      <div class="row">
        <div class="col-12">
          <h1 class="mb-4"><i class="fas fa-user-cog"></i> User Management</h1>
        </div>
      </div>

      <!-- Search Bar -->
      <div class="row mb-4">
        <div class="col-12">
          <div class="card">
            <div class="card-body">
              <form method="get" action="/admin/users">
                <div class="row">
                  <div class="col-md-8">
                    <input
                      type="text"
                      class="form-control"
                      name="search"
                      th:value="${search}"
                      placeholder="Search by username or email..."
                    />
                  </div>
                  <div class="col-md-4">
                    <button type="submit" class="btn btn-primary me-2">
                      <i class="fas fa-search"></i> Search
                    </button>
                    <a href="/admin/users" class="btn btn-outline-secondary">
                      <i class="fas fa-refresh"></i> Clear
                    </a>
                  </div>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>

      <!-- Users Table -->
      <div class="row">
        <div class="col-12">
          <div class="card">
            <div class="card-header">
              <h5><i class="fas fa-users"></i> Users</h5>
            </div>
            <div class="card-body">
              <div class="table-responsive">
                <table class="table table-striped">
                  <thead>
                    <tr>
                      <th>ID</th>
                      <th>Username</th>
                      <th>Email</th>
                      <th>Phone</th>
                      <th>Role</th>
                      <th>Status</th>
                      <th>Failed Attempts</th>
                      <th>Lockout Until</th>
                      <th>Actions</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr th:each="user : ${users}">
                      <td th:text="${user.userId}">1</td>
                      <td th:text="${user.username}">user1</td>
                      <td th:text="${user.email}">user@example.com</td>
                      <td th:text="${user.phone}">1234567890</td>
                      <td>
                        <span
                          class="badge"
                          th:class="${user.role.name() == 'ADMIN' ? 'bg-danger' : 'bg-primary'}"
                          th:text="${user.role.name()}"
                          >USER</span
                        >
                      </td>
                      <td>
                        <span
                          class="badge"
                          th:class="${user.banned ? 'bg-danger' : 'bg-success'}"
                          th:text="${user.banned ? 'Banned' : 'Active'}"
                          >Active</span
                        >
                      </td>
                      <td th:text="${user.failedAttempts}">0</td>
                      <td th:text="${user.lockoutUntil}">-</td>
                      <td>
                        <div class="btn-group" role="group">
                          <button
                            class="btn btn-sm btn-outline-warning"
                            th:onclick="'banUser(' + ${user.userId} + ')'"
                            th:disabled="${user.banned}"
                          >
                            <i class="fas fa-ban"></i>
                          </button>
                          <button
                            class="btn btn-sm btn-outline-success"
                            th:onclick="'unbanUser(' + ${user.userId} + ')'"
                            th:disabled="${!user.banned}"
                          >
                            <i class="fas fa-check"></i>
                          </button>
                          <button
                            class="btn btn-sm btn-outline-info"
                            th:onclick="'changeRole(' + ${user.userId} + ')'"
                          >
                            <i class="fas fa-user-tag"></i>
                          </button>
                        </div>
                      </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(users)}">
                      <td colspan="9" class="text-center text-muted">
                        No users found
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Ban User Modal -->
    <div class="modal fade" id="banModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Ban User</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <form id="banForm">
              <div class="mb-3">
                <label for="banType" class="form-label">Ban Type *</label>
                <select class="form-select" id="banType" required>
                  <option value="">Select ban type...</option>
                  <option value="temp">Temporary</option>
                  <option value="perm">Permanent</option>
                </select>
              </div>
              <div class="mb-3" id="banDurationGroup" style="display: none">
                <label for="banDuration" class="form-label"
                  >Ban Duration (days)</label
                >
                <input
                  type="number"
                  class="form-control"
                  id="banDuration"
                  min="1"
                  max="365"
                />
              </div>
              <div class="mb-3">
                <label for="banReason" class="form-label">Reason *</label>
                <textarea
                  class="form-control"
                  id="banReason"
                  rows="3"
                  placeholder="Enter the reason for banning..."
                  required
                ></textarea>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cancel
            </button>
            <button type="button" class="btn btn-danger" onclick="confirmBan()">
              Ban User
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Unban User Modal -->
    <div class="modal fade" id="unbanModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Unban User</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <form id="unbanForm">
              <div class="mb-3">
                <label for="unbanReason" class="form-label">Reason *</label>
                <textarea
                  class="form-control"
                  id="unbanReason"
                  rows="3"
                  placeholder="Enter the reason for unbanning..."
                  required
                ></textarea>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cancel
            </button>
            <button
              type="button"
              class="btn btn-success"
              onclick="confirmUnban()"
            >
              Unban User
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Change Role Modal -->
    <div class="modal fade" id="roleModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Change User Role</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <form id="roleForm">
              <div class="mb-3">
                <label for="newRole" class="form-label">New Role *</label>
                <select class="form-select" id="newRole" required>
                  <option value="">Select role...</option>
                  <option value="USER">User</option>
                  <option value="ADMIN">Admin</option>
                </select>
              </div>
              <div class="mb-3">
                <label for="roleReason" class="form-label">Reason *</label>
                <textarea
                  class="form-control"
                  id="roleReason"
                  rows="3"
                  placeholder="Enter the reason for role change..."
                  required
                ></textarea>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cancel
            </button>
            <button
              type="button"
              class="btn btn-info"
              onclick="confirmRoleChange()"
            >
              Change Role
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      let currentUserId = null;

      function banUser(userId) {
        currentUserId = userId;
        document.getElementById("banForm").reset();
        document.getElementById("banDurationGroup").style.display = "none";
        new bootstrap.Modal(document.getElementById("banModal")).show();
      }

      function unbanUser(userId) {
        currentUserId = userId;
        document.getElementById("unbanForm").reset();
        new bootstrap.Modal(document.getElementById("unbanModal")).show();
      }

      function changeRole(userId) {
        currentUserId = userId;
        document.getElementById("roleForm").reset();
        new bootstrap.Modal(document.getElementById("roleModal")).show();
      }

      function confirmBan() {
        const banType = document.getElementById("banType").value;
        const banDuration = document.getElementById("banDuration").value;
        const reason = document.getElementById("banReason").value;

        if (!banType || !reason.trim()) {
          alert("Please fill in all required fields");
          return;
        }

        if (banType === "temp" && !banDuration) {
          alert("Please specify ban duration for temporary ban");
          return;
        }

        fetch(`/admin/users/${currentUserId}/ban`, {
          method: "POST",
          headers: {
            "Content-Type": "application/x-www-form-urlencoded",
          },
          body: `banType=${encodeURIComponent(
            banType
          )}&banDuration=${encodeURIComponent(
            banDuration
          )}&reason=${encodeURIComponent(reason)}`,
        })
          .then((response) => {
            if (response.ok) {
              return response.text();
            } else {
              throw new Error("Network response was not ok");
            }
          })
          .then((data) => {
            location.reload();
          })
          .catch((error) => {
            alert("Error: " + error);
          });
      }

      function confirmUnban() {
        const reason = document.getElementById("unbanReason").value;

        if (!reason.trim()) {
          alert("Please provide a reason");
          return;
        }

        fetch(`/admin/users/${currentUserId}/unban`, {
          method: "POST",
          headers: {
            "Content-Type": "application/x-www-form-urlencoded",
          },
          body: `reason=${encodeURIComponent(reason)}`,
        })
          .then((response) => {
            if (response.ok) {
              return response.text();
            } else {
              throw new Error("Network response was not ok");
            }
          })
          .then((data) => {
            location.reload();
          })
          .catch((error) => {
            alert("Error: " + error);
          });
      }

      function confirmRoleChange() {
        const newRole = document.getElementById("newRole").value;
        const reason = document.getElementById("roleReason").value;

        if (!newRole || !reason.trim()) {
          alert("Please fill in all required fields");
          return;
        }

        fetch(`/admin/users/${currentUserId}/change-role`, {
          method: "POST",
          headers: {
            "Content-Type": "application/x-www-form-urlencoded",
          },
          body: `newRole=${encodeURIComponent(
            newRole
          )}&reason=${encodeURIComponent(reason)}`,
        })
          .then((response) => {
            if (response.ok) {
              return response.text();
            } else {
              throw new Error("Network response was not ok");
            }
          })
          .then((data) => {
            location.reload();
          })
          .catch((error) => {
            alert("Error: " + error);
          });
      }

      // Show/hide ban duration based on ban type
      document
        .getElementById("banType")
        .addEventListener("change", function () {
          const durationGroup = document.getElementById("banDurationGroup");
          if (this.value === "temp") {
            durationGroup.style.display = "block";
          } else {
            durationGroup.style.display = "none";
          }
        });
    </script>
  </body>
</html>
