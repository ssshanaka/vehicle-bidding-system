<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auction List - Vehicle Bidding System</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="/css/custom.css" rel="stylesheet" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Include Header -->
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container mt-4">
      <div class="row">
        <div class="col-12">
          <h1 class="mb-4"><i class="fas fa-gavel"></i> All Auctions</h1>
        </div>
      </div>

      <!-- Enhanced Filters -->
      <div class="row mb-4">
        <div class="col-12">
          <div class="card shadow-sm border-0">
            <div class="card-body">
              <form method="get" action="/auctions/list" class="row g-3">
                <!-- Status Filter -->
                <div class="col-md-2">
                  <label for="status" class="form-label fw-semibold">
                    <i class="bi bi-funnel me-1"></i>Status
                  </label>
                  <select class="form-select" id="status" name="status">
                    <option value="">All Statuses</option>
                    <option
                      value="PENDING"
                      th:selected="${currentStatus == 'PENDING'}"
                    >
                      Pending
                    </option>
                    <option
                      value="ACTIVE"
                      th:selected="${currentStatus == 'ACTIVE'}"
                    >
                      Active
                    </option>
                    <option
                      value="CLOSED"
                      th:selected="${currentStatus == 'CLOSED'}"
                    >
                      Closed
                    </option>
                  </select>
                </div>

                <!-- Search -->
                <div class="col-md-3">
                  <label for="search" class="form-label fw-semibold">
                    <i class="bi bi-search me-1"></i>Search
                  </label>
                  <input
                    type="text"
                    class="form-control"
                    id="search"
                    name="search"
                    th:value="${searchTerm}"
                    placeholder="Search by make, model, or description..."
                  />
                </div>

                <!-- Sort By -->
                <div class="col-md-2">
                  <label for="sortBy" class="form-label fw-semibold">
                    <i class="bi bi-sort-down me-1"></i>Sort By
                  </label>
                  <select class="form-select" id="sortBy" name="sortBy">
                    <option value="">Default</option>
                    <option
                      value="endtime"
                      th:selected="${sortBy == 'endtime'}"
                    >
                      End Time
                    </option>
                    <option
                      value="starttime"
                      th:selected="${sortBy == 'starttime'}"
                    >
                      Start Time
                    </option>
                    <option
                      value="highestbid"
                      th:selected="${sortBy == 'highestbid'}"
                    >
                      Highest Bid
                    </option>
                  </select>
                </div>

                <!-- Sort Direction -->
                <div class="col-md-2">
                  <label for="sortDir" class="form-label fw-semibold">
                    <i class="bi bi-arrow-up-down me-1"></i>Order
                  </label>
                  <select class="form-select" id="sortDir" name="sortDir">
                    <option value="asc" th:selected="${sortDir == 'asc'}">
                      Ascending
                    </option>
                    <option value="desc" th:selected="${sortDir == 'desc'}">
                      Descending
                    </option>
                  </select>
                </div>

                <!-- Page Size -->
                <div class="col-md-2">
                  <label for="size" class="form-label fw-semibold">
                    <i class="bi bi-list me-1"></i>Per Page
                  </label>
                  <select class="form-select" id="size" name="size">
                    <option value="12" th:selected="${size == 12}">12</option>
                    <option value="24" th:selected="${size == 24}">24</option>
                    <option value="48" th:selected="${size == 48}">48</option>
                  </select>
                </div>

                <!-- Actions -->
                <div class="col-md-1 d-flex align-items-end">
                  <div class="d-grid gap-2 w-100">
                    <button type="submit" class="btn btn-primary">
                      <i class="bi bi-funnel me-1"></i>Filter
                    </button>
                    <a
                      href="/auctions/list"
                      class="btn btn-outline-secondary btn-sm"
                    >
                      <i class="bi bi-arrow-clockwise me-1"></i>Clear
                    </a>
                  </div>
                </div>

                <!-- Hidden fields -->
                <input type="hidden" name="page" th:value="${currentPage}" />
              </form>
            </div>
          </div>
        </div>
      </div>
