<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Active Auctions - VehicleBid</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Bootstrap Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <!-- Custom CSS -->
    <link href="/css/custom.css" rel="stylesheet" />
  </head>
  <body>
    <!-- Header -->
    <div th:replace="fragments/header :: header"></div>

    <!-- Main Content -->
    <main class="container mt-5 pt-4">
      <!-- Page Header -->
      <div class="row mb-4">
        <div class="col-12">
          <div class="d-flex align-items-center justify-content-between">
            <div>
              <h1 class="h3 mb-1">
                <i class="bi bi-hammer me-2 text-primary"></i>
                Active Auctions
              </h1>
              <p class="text-muted mb-0">
                Browse and bid on available vehicles
              </p>
            </div>
            <div>
              <span class="badge bg-success fs-6">
                <i class="bi bi-clock me-1"></i>
                <span th:text="${totalElements}">0</span> Active
              </span>
            </div>
          </div>
        </div>
      </div>

      <!-- Search and Filter Section -->
      <div class="row mb-4">
        <div class="col-12">
          <div class="card shadow-sm border-0">
            <div class="card-body">
              <form th:action="@{/auctions}" method="get" class="row g-3">
                <!-- Search -->
                <div class="col-md-4">
                  <label for="search" class="form-label fw-semibold">
                    <i class="bi bi-search me-1"></i>
                    Search Vehicles
                  </label>
                  <input
                    type="text"
                    class="form-control"
                    id="search"
                    name="search"
                    th:value="${search}"
                    placeholder="Search by make, model, or description..."
                  />
                </div>

                <!-- Sort By -->
                <div class="col-md-3">
                  <label for="sortBy" class="form-label fw-semibold">
                    <i class="bi bi-sort-down me-1"></i>
                    Sort By
                  </label>
                  <select class="form-select" id="sortBy" name="sortBy">
                    <option value="">Default (End Time)</option>
                    <option
                      value="endtime"
                      th:selected="${sortBy == 'endtime'}"
                    >
                      End Time
                    </option>
                    <option
                      value="starttime"
                      th:selected="${sortBy == 'starttime'}"
                    >
                      Start Time
                    </option>
                    <option
                      value="highestbid"
                      th:selected="${sortBy == 'highestbid'}"
                    >
                      Highest Bid
                    </option>
                  </select>
                </div>

                <!-- Sort Direction -->
                <div class="col-md-2">
                  <label for="sortDir" class="form-label fw-semibold">
                    <i class="bi bi-arrow-up-down me-1"></i>
                    Order
                  </label>
                  <select class="form-select" id="sortDir" name="sortDir">
                    <option value="asc" th:selected="${sortDir == 'asc'}">
                      Ascending
                    </option>
                    <option value="desc" th:selected="${sortDir == 'desc'}">
                      Descending
                    </option>
                  </select>
                </div>
