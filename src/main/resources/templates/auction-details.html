<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auction Details - Lanka Auto Traders</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Bootstrap Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <!-- Custom CSS -->
    <link href="/css/custom.css" rel="stylesheet" />
    <style>
      .image-gallery {
        position: relative;
      }
      .main-image {
        height: 500px;
        object-fit: cover;
        cursor: pointer;
        transition: transform 0.2s;
      }
      .main-image:hover {
        transform: scale(1.02);
      }
      .thumbnail {
        height: 80px;
        object-fit: cover;
        cursor: pointer;
        opacity: 0.7;
        transition: opacity 0.2s;
      }
      .thumbnail:hover,
      .thumbnail.active {
        opacity: 1;
      }
      .status-badge {
        font-size: 0.9rem;
        padding: 0.5rem 1rem;
      }
      .detail-card {
        border: none;
        box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
      }
      .detail-section {
        background: #f8f9fa;
        border-radius: 0.5rem;
        padding: 1.5rem;
        margin-bottom: 1rem;
      }
      .detail-label {
        font-weight: 600;
        color: #495057;
        margin-bottom: 0.25rem;
      }
      .detail-value {
        color: #212529;
        margin-bottom: 1rem;
      }
      .description-text {
        line-height: 1.6;
        color: #495057;
      }
      .countdown-timer-large {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 1rem;
        border-radius: 0.5rem;
        text-align: center;
      }
      .bid-section {
        background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
        color: white;
        padding: 2rem;
        border-radius: 0.5rem;
        text-align: center;
      }
      .bid-history-card {
        max-height: 400px;
        overflow-y: auto;
      }
    </style>
  </head>
  <body>
    <!-- Include Header -->
    <div th:replace="~{fragments/header :: header}"></div>

    <!-- Main Content -->
    <main class="container-fluid py-4">
      <!-- Breadcrumb -->
      <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb bg-light rounded p-3 border-0 shadow-sm">
          <li class="breadcrumb-item">
            <a href="/auctions" class="text-decoration-none fw-semibold">
              <i class="bi bi-hammer me-1 text-primary"></i>Auctions
            </a>
          </li>
          <li class="breadcrumb-item active fw-semibold" aria-current="page">
            <i class="bi bi-eye me-1 text-primary"></i>Auction Details
          </li>
        </ol>
      </nav>
