<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logout - Vehicle Bidding System</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container mt-5" style="max-width: 520px">
      <h1 class="mb-4">Logout</h1>
      <p>Are you sure you want to logout?</p>
      <button id="confirm" class="btn btn-danger">Logout</button>
      <a href="/" class="btn btn-secondary ms-2">Cancel</a>
    </div>
    <script>
      document.getElementById("confirm").addEventListener("click", async () => {
        // Best effort: clear cookie by setting past expiry; server uses HttpOnly so client cannot delete guaranteed
        document.cookie = "JWT=; Path=/; Max-Age=0;";
        // Redirect to homepage after logout
        window.location.href = "/";
      });
    </script>
  </body>
</html>
