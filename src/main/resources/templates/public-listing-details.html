<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Listing - Vehicle Bidding System</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container mt-5">
      <a href="/listings" class="btn btn-link">Back to listings</a>
      <h1 class="mb-4" th:text="${listing.make + ' ' + listing.model}"></h1>
      <div class="row">
        <div class="col-md-8">
          <div id="images" class="row g-2">
            <div class="col-6" th:each="img : ${listing.images}">
              <img
                th:src="${img.imageUrl}"
                class="img-fluid rounded"
                alt="Vehicle image"
              />
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <ul class="list-group">
            <li class="list-group-item">
              Year: <span th:text="${listing.year}"></span>
            </li>
            <li class="list-group-item">
              Mileage: <span th:text="${listing.mileage}"></span>
            </li>
            <li class="list-group-item">
              Condition: <span th:text="${listing.condition}"></span>
            </li>
            <li class="list-group-item">
              Fuel: <span th:text="${listing.fuelType}"></span>
            </li>
            <li class="list-group-item">
              Transmission: <span th:text="${listing.transmission}"></span>
            </li>
            <li class="list-group-item">
              Status: <span th:text="${listing.status}"></span>
            </li>
          </ul>
          <div class="mt-3">
            <strong>Description</strong>
            <p th:text="${listing.description}"></p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
