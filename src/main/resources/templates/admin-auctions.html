<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Auctions - Vehicle Bidding System</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link th:href="@{/css/styles.css}" rel="stylesheet" />
    <!-- Assuming a custom CSS file -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- WebSocket Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

    <!-- Auction Timer -->
    <script th:src="@{/js/auction-timer.js}"></script>
    <!-- Custom JS for countdown timers -->
  </head>
  <body>
    <div class="container mt-5">
      <h1 class="mb-4">Manage Auctions</h1>

      <!-- Search and Filter Form -->
      <form class="mb-4" th:action="@{/admin/auctions}" method="get">
        <div class="input-group">
          <input
            type="text"
            class="form-control"
            name="search"
            placeholder="Search by ID, Vehicle, or Status"
          />
          <button class="btn btn-primary" type="submit">Search</button>
        </div>
      </form>
