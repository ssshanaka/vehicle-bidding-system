<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Auctions - Vehicle Bidding System</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link th:href="@{/css/styles.css}" rel="stylesheet" />
    <!-- Assuming a custom CSS file -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- WebSocket Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

    <!-- Auction Timer -->
    <script th:src="@{/js/auction-timer.js}"></script>
    <!-- Custom JS for countdown timers -->
  </head>
  <body>
    <div class="container mt-5">
      <h1 class="mb-4">Manage Auctions</h1>

      <!-- Search and Filter Form -->
      <form class="mb-4" th:action="@{/admin/auctions}" method="get">
        <div class="input-group">
          <input
            type="text"
            class="form-control"
            name="search"
            placeholder="Search by ID, Vehicle, or Status"
          />
          <button class="btn btn-primary" type="submit">Search</button>
        </div>
      </form>

      <div class="table-responsive">
        <table class="table table-striped table-hover">
          <thead class="table-dark">
            <tr>
              <th>ID</th>
              <th>Vehicle</th>
              <th>Current Bid</th>
              <th>Status</th>
              <th>Countdown</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="auction : ${auctions}">
              <td th:text="${auction.auctionId}"></td>
              <td
                th:text="${auction.listing.make + ' ' + auction.listing.model}"
              ></td>
              <td th:text="${auction.highestBid}"></td>
              <td th:text="${auction.status}"></td>
              <td>
                <span
                  th:id="${'countdown-' + auction.auctionId}"
                  th:attr="data-end-time=${auction.currentEndTime}"
                ></span>
              </td>
              <td>
                <a
                  th:href="@{/admin/auctions/edit/{id}(id=${auction.auctionId})}"
                  class="btn btn-sm btn-warning"
                  >Edit/Approve</a
                >
                <form
                  th:action="@{/admin/auctions/start/{id}(id=${auction.auctionId})}"
                  method="post"
                  class="d-inline"
                >
                  <button
                    type="submit"
                    class="btn btn-sm btn-success"
                    th:if="${auction.status.name() == 'PENDING'}"
                  >
                    Start Now
                  </button>
                </form>
                <form
                  th:action="@{/admin/auctions/end/{id}(id=${auction.auctionId})}"
                  method="post"
                  class="d-inline"
                >
                  <button
                    type="submit"
                    class="btn btn-sm btn-danger"
                    th:if="${auction.status.name() == 'ACTIVE'}"
                  >
                    End
                  </button>
                </form>
                <a
                  th:href="@{/auctions/details/{id}(id=${auction.auctionId})}"
                  class="btn btn-sm btn-info"
                  >View</a
                >
              </td>
            </tr>
            <tr th:if="${auctions.empty}">
              <td colspan="6" class="text-center">No auctions available.</td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Pagination (if needed) -->
      <nav aria-label="Pagination" th:if="${totalPages > 1}">
        <ul class="pagination justify-content-center">
          <!-- Add pagination links here using Thymeleaf -->
        </ul>
      </nav>
    </div>
  </body>
</html>
