<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Error - Vehicle Bidding System</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-8">
          <div class="card border-danger">
            <div class="card-header bg-danger text-white">
              <h2 class="mb-0">
                <i class="fas fa-exclamation-triangle"></i> Error
              </h2>
            </div>
            <div class="card-body">
              <div class="alert alert-danger">
                <h4 class="alert-heading">
                  <i class="fas fa-times-circle"></i>
                  <span
                    th:text="${errorMessage != null ? errorMessage : 'An error occurred'}"
                    >An error occurred</span
                  >
                </h4>
                <p class="mb-0">
                  We apologize for the inconvenience. Please try again or return
                  to the homepage.
                </p>
              </div>

              <div class="mt-4" th:if="${errorDetails != null}">
                <h5>Error Details:</h5>
                <p class="text-muted" th:text="${errorDetails}">
                  Error details
                </p>
              </div>

              <div class="mt-4" th:if="${requestUri != null}">
                <h5>Request URI:</h5>
                <p class="text-muted" th:text="${requestUri}">Request URI</p>
              </div>

              <div class="mt-4">
                <a href="/" class="btn btn-primary">
                  <i class="fas fa-home"></i> Return to Home
                </a>
                <button onclick="history.back()" class="btn btn-secondary ms-2">
                  <i class="fas fa-arrow-left"></i> Go Back
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
