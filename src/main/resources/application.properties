spring.application.name=vehicle-bidding-system

# running server
server.port=8010

# JWT
app.jwt.secret=change-me-super-secret-key-change-me-super-secret-key
app.jwt.expirationMs=86400000

# Datasource configuration
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=vehicle-bidding-system;encrypt=true;trustServerCertificate=true
spring.datasource.username=vehidb
spring.datasource.password=Admin123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA/Hibernate settings
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=update
  #spring.jpa.hibernate.ddl-auto=validate -> Or 'none' to prevent any schema changes
spring.jpa.show-sql=true
  #spring.jpa.show-sql=true -> Logs SQL queries for debugging (turn off in production)
spring.jpa.properties.hibernate.format_sql=true  
# Formats SQL in logs for readability

# Optional: Connection pool settings for performance (e.g., 100 users)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# Error handling and logging
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=true

# WebSocket configuration
spring.websocket.sockjs.enabled=true
spring.websocket.sockjs.path=/ws

# HTTP connection settings
server.tomcat.connection-timeout=120000
server.tomcat.keep-alive-timeout=60000
server.tomcat.max-connections=8192
server.tomcat.max-http-post-size=10MB
server.tomcat.max-swallow-size=10MB
server.tomcat.max-threads=200
server.tomcat.accept-count=100

# Database query timeout settings
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.leak-detection-threshold=60000

# JPA query timeout
spring.jpa.properties.hibernate.query.timeout=120
spring.jpa.properties.jakarta.persistence.query.timeout=120000

# Response compression
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024

# Logging configuration
logging.level.com.sliit.vehiclebiddingsystem=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.messaging=DEBUG

spring.mvc.favicon.enabled=false

# Mail configuration (use real creds in env/secure storage)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
